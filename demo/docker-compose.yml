networks:
  traefik-net:
    driver: bridge

services:
  traefik:
    image: "traefik:latest"
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true" # Required for the dashboard to access the API
      - "--api.dashboard=true" # Enable the Traefik dashboard
      - "--providers.docker=true" # Enable Docker provider
      - "--providers.docker.exposedbydefault=false" # Don't expose containers by default
      - "--entrypoints.web.address=:80" # HTTP entrypoint
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure" # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https" # Redirect scheme to HTTPS
      - "--entrypoints.websecure.address=:443" # HTTPS entrypoint
      - "--entrypoints.websecure.http.tls=true" # Enable TLS for websecure
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro" # Docker socket for provider
    networks:
      - traefik-net # A shared network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  trala:
    # Use GitHub Container Registry or build locally
    # image: ghcr.io/rendyhd/trala:latest
    build: ../.
    container_name: trala
    restart: unless-stopped
    networks:
      - traefik-net # Must be on the same network as Traefik
    volumes:
      # Optional: Mount a configuration file. See "Configuration" section below.
      - ./configuration.yml:/config/configuration.yml:ro
      # Optional: Mount a directory with custom icons. See "Configuration" section below.
      # - ./icons:/icons:ro
    environment:
      # Required: The internal Docker network address for the Traefik API
      - TRAEFIK_API_HOST=http://traefik:8080
      # Optional: Change refresh interval
      - REFRESH_INTERVAL_SECONDS=30
      # Optional: Change the search engine
      - SEARCH_ENGINE_URL=https://duckduckgo.com/?q=
      # Optional: Set to "debug" for verbose icon-finding logs
      - LOG_LEVEL=info
    labels:
      # --- Traefik Labels to expose TraLa itself ---
      - "traefik.enable=true"
      - "traefik.http.routers.trala.rule=Host(`trala.localhost`)"
      - "traefik.http.routers.trala.entrypoints=websecure"
      - "traefik.http.routers.trala.tls=true"
      - "traefik.http.services.trala.loadbalancer.server.port=8080"
      - "traefik.http.services.trala.loadbalancer.server.scheme=http"

  # Mock services using traefik/whoami
  subscription-manager:
    image: "traefik/whoami"
    container_name: subscription-manager
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.subscription-manager.rule=Host(`subscription-manager.localhost`)"
      - "traefik.http.routers.subscription-manager.entrypoints=websecure"
      - "traefik.http.services.subscription-manager.loadbalancer.server.port=80"

