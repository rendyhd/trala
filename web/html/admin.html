<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraLa - Settings</title>
    <link rel="stylesheet" href="static/css/tailwind.css">
    <link rel="stylesheet" href="static/css/trala.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="static/img/favicon.ico" type="image/x-icon">
    <link rel="icon" href="static/img/gopher.svg" type="image/svg+xml">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased">
    <!-- Toast notification -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="rounded-lg px-4 py-3 shadow-lg text-sm font-medium"></div>
    </div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <nav class="w-56 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <a href="/" class="flex items-center">
                    <img src="static/img/gopher.svg" alt="Logo" class="h-8 w-8 mr-2">
                    <span class="text-xl font-bold logo-font text-blue-500">TraLa</span>
                </a>
            </div>
            <div class="p-3 flex-1 overflow-y-auto">
                <div class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider px-2 mb-2">Settings</div>
                <button data-section="general" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">General</button>
                <button data-section="traefik" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Traefik</button>
                <button data-section="grouping" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Grouping</button>
                <button data-section="auth" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Authentication</button>
                <button data-section="permissions" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Permissions</button>

                <div class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider px-2 mb-2 mt-4">Services</div>
                <button data-section="manual" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Manual Services</button>
                <button data-section="overrides" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Overrides</button>
                <button data-section="exclusions" class="nav-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium mb-1 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700">Exclusions</button>
            </div>
            <div class="p-3 border-t border-gray-200 dark:border-gray-700">
                <a href="/" class="flex items-center px-3 py-2 text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Dashboard
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="max-w-4xl mx-auto p-6 md:p-8">
                <div class="flex items-center justify-between mb-6">
                    <h1 id="section-title" class="text-2xl font-bold">General Settings</h1>
                    <button id="save-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors text-sm">
                        Save Changes
                    </button>
                </div>

                <div id="content-area">
                    <!-- Sections rendered by JS -->
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="static/js/admin.js"></script>
</body>
</html>
